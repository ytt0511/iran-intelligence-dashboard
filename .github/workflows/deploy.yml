name: Build Check

# 仅用于构建检查，实际部署由 Vercel 自动处理
# 当 GitHub 数据更新后，Vercel 会自动检测到变化并重新部署

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build check
        run: |
          if [ -d "out" ]; then
            echo "✅ Build successful!"
          else
            echo "❌ Build failed: out directory not found"
            exit 1
          fi
